name: PHP Composer

on:
  push:
    branches: [ "master", "test"]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # 這裡啟動 Redis 容器
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        # 修正：你的原腳本 8.0 少了一個單引號，已補上
        php: ['8.0', '8.1', '8.2', '8.3']

    name: PHP ${{ matrix.php }} tests

    steps:
      - uses: actions/checkout@v3

      # 使用 shivammathur/setup-php 是目前 Laravel 社群的主流做法
      # 它能幫你處理好 PHP 版本、套件擴充（如 redis, bcmath）
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, redis
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run test suite
        # 如果有連動 Redis，確保 .env.testing 的 REDIS_HOST 是 127.0.0.1
        run: composer run-script test